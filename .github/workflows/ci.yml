name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Constitution: GitHub OIDC -> UAMI; no client secret anywhere.
permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_SUBSCRIPTION_ID: d3c24b47-6f06-4152-8ade-6be38ba31c8c
  AZURE_RESOURCE_GROUP: sainitesh-test
  AZURE_REGION: eastus
  DOTNET_VERSION: "10.0.x"

jobs:
  # ----------------------------------------------------------------------
  # Job 1: Azure context guard (T012). Blocks EVERYTHING downstream.
  # ----------------------------------------------------------------------
  assert-context:
    name: Assert Azure context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Assert subscription + resource group
        shell: bash
        run: |
          chmod +x scripts/assert-azure-context.sh
          scripts/assert-azure-context.sh "${AZURE_RESOURCE_GROUP}"

  # ----------------------------------------------------------------------
  # Job 2: Region availability guard (T012a). Blocks all infra/deploy jobs.
  # ----------------------------------------------------------------------
  assert-region:
    name: Assert region availability
    needs: assert-context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Assert region SKU availability
        shell: bash
        run: |
          chmod +x scripts/assert-region-availability.sh
          # Region is sourced from infra/params/<env>.bicepparam in later phases;
          # for now we assert the v1 default explicitly.
          scripts/assert-region-availability.sh "${AZURE_REGION}"

  # ----------------------------------------------------------------------
  # Job 3: Resource-provider registration guard (T012b). Blocks all
  # infra/deploy jobs.
  # ----------------------------------------------------------------------
  assert-providers:
    name: Assert resource providers registered
    needs: assert-region
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Assert required RPs registered
        shell: bash
        run: |
          chmod +x scripts/assert-providers-registered.sh
          scripts/assert-providers-registered.sh

  # ----------------------------------------------------------------------
  # Build / test / scan / push / deploy — skeletons wired by later phases.
  # ----------------------------------------------------------------------
  build:
    name: Build
    needs: assert-providers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TaskManager.sln

      - name: Build (Release, warnings-as-errors enforced by Directory.Build.props)
        run: dotnet build TaskManager.sln -c Release --no-restore

  unit-tests:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Bash history expansion would mangle the `!=` filter, so we set +H first.
      # T101 — TaskManager.sln includes tests/McpServer.Tests, so McpServer unit
      # tests run here automatically and contribute to the aggregate ≥80 % gate.
      - name: Run unit tests (Category != Integration) with coverage
        shell: bash
        run: |
          set +H
          dotnet test TaskManager.sln \
            -c Release \
            --filter 'Category!=Integration' \
            --logger 'trx;LogFileName=unit-tests.trx' \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report + enforce ≥80% line coverage
        shell: bash
        run: |
          reportgenerator \
            -reports:'TestResults/**/coverage.cobertura.xml' \
            -targetdir:./TestResults/coverage \
            -reporttypes:'Html;TextSummary;Cobertura' \
            -title:'Task Manager API'
          cat TestResults/coverage/Summary.txt
          line=$(grep -E '^Line coverage:' TestResults/coverage/Summary.txt | head -1 | sed -E 's/.*: *([0-9.]+)%.*/\1/')
          echo "Line coverage = ${line}%"
          awk -v c="$line" 'BEGIN { exit (c+0 >= 80 ? 0 : 1) }' || {
            echo "::error::Line coverage ${line}% is below the 80% gate."
            exit 1
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/coverage

  integration-tests:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ubuntu-latest ships with Docker, which Testcontainers.PostgreSql needs.
      - name: Run Testcontainers-backed integration tests (Category=Integration)
        shell: bash
        run: |
          set +H
          dotnet test TaskManager.sln \
            -c Release \
            --filter 'Category=Integration' \
            --logger 'trx;LogFileName=integration-tests.trx' \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/*.trx

  # ----------------------------------------------------------------------
  # T114 — Prod-overlay lint: ensure MCP_ALLOW_MUTATIONS is NEVER true in
  # deploy/overlays/prod. Gates the deploy job (Principle II).
  # ----------------------------------------------------------------------
  lint-prod-overlay:
    name: Lint prod overlay (no MCP mutations)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run prod-overlay linter
        shell: bash
        run: |
          chmod +x scripts/lint-prod-overlay.sh
          scripts/lint-prod-overlay.sh deploy/overlays/prod

  # ----------------------------------------------------------------------
  # T115 — Trivy CVE gate. Builds BOTH images locally (no push) and scans
  # them; fails on any HIGH or CRITICAL. Must succeed before `push`.
  # ----------------------------------------------------------------------
  trivy-scan:
    name: Trivy CVE scan
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build webapp image (load to local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webapp
          push: false
          load: true
          provenance: false
          tags: trivy-scan/taskmgr-webapp:${{ github.sha }}

      - name: Build mcpserver image (load to local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcpserver
          push: false
          load: true
          provenance: false
          tags: trivy-scan/taskmgr-mcpserver:${{ github.sha }}

      - name: Trivy scan — webapp (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: trivy-scan/taskmgr-webapp:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Trivy scan — mcpserver (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: trivy-scan/taskmgr-mcpserver:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  # ----------------------------------------------------------------------
  # T116a verification — `bicep build` the alerts module and assert both
  # required alert resources appear in the compiled ARM. Cheap supply-chain
  # check that the constitution's required alerts can't silently disappear.
  # ----------------------------------------------------------------------
  bicep-validate:
    name: Bicep validate (alerts module assertions)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Build main.bicep
        run: bicep build infra/main.bicep --outfile /tmp/main.json

      - name: Assert alerts module wired and both rules emitted
        shell: bash
        run: |
          set -euo pipefail
          # The compiled ARM must contain BOTH alert resource types and
          # references to /readyz (metric alert) and redaction_failures_total
          # (log-search alert) so that the constitution's required alerts
          # can't be silently removed from the module.
          if ! grep -q 'Microsoft.Insights/metricAlerts' /tmp/main.json; then
            echo "::error::main.bicep ARM is missing Microsoft.Insights/metricAlerts (readyz 5xx alert)"
            exit 1
          fi
          if ! grep -q 'Microsoft.Insights/scheduledQueryRules' /tmp/main.json; then
            echo "::error::main.bicep ARM is missing Microsoft.Insights/scheduledQueryRules (redaction-failures log alert)"
            exit 1
          fi
          grep -q '/readyz' /tmp/main.json || { echo "::error::readyz dimension filter missing"; exit 1; }
          grep -q 'redaction_failures_total' /tmp/main.json || { echo "::error::redaction_failures_total query missing"; exit 1; }
          echo "OK: both constitution-required alert rules present in compiled ARM."

  push:
    name: Push images
    needs: trivy-scan
    runs-on: ubuntu-latest
    # Only push on merges to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ACR_NAME: acrtaskmgrdev
      WEBAPP_REPO: taskmgr-webapp
      MCP_REPO: taskmgr-mcpserver
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          login_server=$(az acr show -n "${ACR_NAME}" --query loginServer -o tsv)
          echo "login_server=${login_server}" >> "$GITHUB_OUTPUT"
          echo "Resolved login server: ${login_server}"

      - name: ACR login
        run: az acr login -n "${ACR_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # T070 — webapp image
      - name: Build and push webapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webapp
          push: true
          provenance: false
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ env.WEBAPP_REPO }}:${{ github.sha }}
            ${{ steps.acr.outputs.login_server }}/${{ env.WEBAPP_REPO }}:latest

      # T102 — mcpserver image
      - name: Build and push mcpserver image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcpserver
          push: true
          provenance: false
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ env.MCP_REPO }}:${{ github.sha }}
            ${{ steps.acr.outputs.login_server }}/${{ env.MCP_REPO }}:latest

  # ----------------------------------------------------------------------
  # T116 — Deploy. OIDC to UAMI (no client secret), render the dev overlay
  # with the freshly-pushed SHA tag, kubectl apply, wait for the migrate
  # Job to complete BEFORE the webapp Deployment rollout finishes.
  # ----------------------------------------------------------------------
  deploy:
    name: Deploy (dev)
    needs: [push, lint-prod-overlay, bicep-validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ACR_NAME: acrtaskmgrdev
      OVERLAY: deploy/overlays/dev
      NAMESPACE: taskmgr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC, federated to UAMI)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve AKS cluster + ACR login server
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          login_server=$(az acr show -n "${ACR_NAME}" --query loginServer -o tsv)
          aks_name=$(az aks list -g "${AZURE_RESOURCE_GROUP}" --query "[0].name" -o tsv)
          if [[ -z "${aks_name}" ]]; then
            echo "::error::No AKS cluster found in ${AZURE_RESOURCE_GROUP}"
            exit 1
          fi
          echo "login_server=${login_server}" >> "$GITHUB_OUTPUT"
          echo "aks_name=${aks_name}" >> "$GITHUB_OUTPUT"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${{ steps.ctx.outputs.aks_name }}" \
            --overwrite-existing
          kubectl config current-context

      - name: Render overlay (substitute ACR + image tag)
        shell: bash
        run: |
          set -euo pipefail
          # The base kustomization carries __ACR_LOGIN_SERVER__/__IMAGE_TAG__
          # placeholders so the same manifests work in any env. Substitute
          # in-place before kubectl apply.
          find deploy -type f -name '*.yaml' -print0 | xargs -0 sed -i \
            -e "s|__ACR_LOGIN_SERVER__|${{ steps.ctx.outputs.login_server }}|g" \
            -e "s|__IMAGE_TAG__|${GITHUB_SHA}|g"
          echo "--- rendered base kustomization images ---"
          kubectl kustomize "${OVERLAY}" | grep -E '^\s*image:' | sort -u

      - name: Apply manifests
        run: kubectl apply -k "${OVERLAY}"

      - name: Wait for migrate Job to complete (before webapp rolls out)
        shell: bash
        run: |
          set -euo pipefail
          # The migrate Job carries argocd sync-wave -10 (PreSync) but plain
          # kubectl apply doesn't honor waves — so we explicitly block.
          kubectl -n "${NAMESPACE}" wait \
            --for=condition=complete \
            --timeout=300s \
            job/webapp-migrate

      - name: Wait for webapp + mcp-server rollouts
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout status deployment/webapp    --timeout=300s
          kubectl -n "${NAMESPACE}" rollout status deployment/mcp-server --timeout=300s

      - name: Show deployed objects
        if: always()
        run: kubectl -n "${NAMESPACE}" get pods,svc,deploy,job -o wide
