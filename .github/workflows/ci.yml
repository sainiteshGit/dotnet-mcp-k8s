name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Constitution: GitHub OIDC -> UAMI; no client secret anywhere.
permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_SUBSCRIPTION_ID: d3c24b47-6f06-4152-8ade-6be38ba31c8c
  AZURE_RESOURCE_GROUP: sainitesh-test
  AZURE_REGION: eastus
  DOTNET_VERSION: "10.0.x"

jobs:
  # ----------------------------------------------------------------------
  # Job 1: Azure context guard (T012). Blocks EVERYTHING downstream.
  # ----------------------------------------------------------------------
  assert-context:
    name: Assert Azure context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Assert subscription + resource group
        shell: bash
        run: |
          chmod +x scripts/assert-azure-context.sh
          scripts/assert-azure-context.sh "${AZURE_RESOURCE_GROUP}"

  # ----------------------------------------------------------------------
  # Job 2: Region availability guard (T012a). Blocks all infra/deploy jobs.
  # ----------------------------------------------------------------------
  assert-region:
    name: Assert region availability
    needs: assert-context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Assert region SKU availability
        shell: bash
        run: |
          chmod +x scripts/assert-region-availability.sh
          # Region is sourced from infra/params/<env>.bicepparam in later phases;
          # for now we assert the v1 default explicitly.
          scripts/assert-region-availability.sh "${AZURE_REGION}"

  # ----------------------------------------------------------------------
  # Job 3: Resource-provider registration guard (T012b). Blocks all
  # infra/deploy jobs.
  # ----------------------------------------------------------------------
  assert-providers:
    name: Assert resource providers registered
    needs: assert-region
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Assert required RPs registered
        shell: bash
        run: |
          chmod +x scripts/assert-providers-registered.sh
          scripts/assert-providers-registered.sh

  # ----------------------------------------------------------------------
  # Build / test / scan / push / deploy — skeletons wired by later phases.
  # ----------------------------------------------------------------------
  build:
    name: Build
    needs: assert-providers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TaskManager.sln

      - name: Build (Release, warnings-as-errors enforced by Directory.Build.props)
        run: dotnet build TaskManager.sln -c Release --no-restore

  unit-tests:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Bash history expansion would mangle the `!=` filter, so we set +H first.
      # T101 — TaskManager.sln includes tests/McpServer.Tests, so McpServer unit
      # tests run here automatically and contribute to the aggregate ≥80 % gate.
      - name: Run unit tests (Category != Integration) with coverage
        shell: bash
        run: |
          set +H
          dotnet test TaskManager.sln \
            -c Release \
            --filter 'Category!=Integration' \
            --logger 'trx;LogFileName=unit-tests.trx' \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report + enforce ≥80% line coverage
        shell: bash
        run: |
          reportgenerator \
            -reports:'TestResults/**/coverage.cobertura.xml' \
            -targetdir:./TestResults/coverage \
            -reporttypes:'Html;TextSummary;Cobertura' \
            -title:'Task Manager API'
          cat TestResults/coverage/Summary.txt
          line=$(grep -E '^Line coverage:' TestResults/coverage/Summary.txt | head -1 | sed -E 's/.*: *([0-9.]+)%.*/\1/')
          echo "Line coverage = ${line}%"
          awk -v c="$line" 'BEGIN { exit (c+0 >= 80 ? 0 : 1) }' || {
            echo "::error::Line coverage ${line}% is below the 80% gate."
            exit 1
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/coverage

  integration-tests:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ubuntu-latest ships with Docker, which Testcontainers.PostgreSql needs.
      - name: Run Testcontainers-backed integration tests (Category=Integration)
        shell: bash
        run: |
          set +H
          dotnet test TaskManager.sln \
            -c Release \
            --filter 'Category=Integration' \
            --logger 'trx;LogFileName=integration-tests.trx' \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/*.trx

  trivy-scan:
    name: Trivy CVE scan
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: TODO(Phase 5 T115) — Trivy HIGH/CRITICAL gate on both images
        run: echo "trivy-scan job skeleton — wired by T115"

  push:
    name: Push images
    needs: trivy-scan
    runs-on: ubuntu-latest
    # Only push on merges to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ACR_NAME: acrtaskmgrdev
      IMAGE_REPO: taskmgr-webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          login_server=$(az acr show -n "${ACR_NAME}" --query loginServer -o tsv)
          echo "login_server=${login_server}" >> "$GITHUB_OUTPUT"
          echo "Resolved login server: ${login_server}"

      - name: ACR login
        run: az acr login -n "${ACR_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # T070 — build the webapp image from Dockerfile.webapp (T062) and push
      # to ACR. The MCP image (T102) will reuse this job pattern.
      - name: Build and push webapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webapp
          push: true
          provenance: false
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_REPO }}:latest

  deploy:
    name: Deploy
    needs: push
    runs-on: ubuntu-latest
    steps:
      - name: TODO(Phase 5 T116) — kubectl apply -k deploy/overlays/<env> after migrate Job
        run: echo "deploy job skeleton — wired by T116"
