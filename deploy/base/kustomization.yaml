apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskmgr

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - webapp-config.yaml
  - webapp-migrate-job.yaml
  - webapp-deployment.yaml
  - webapp-service.yaml

# T066 — webapp Deployment/Service/Job + ConfigMap wired by Phase 3.
# US2 (MCP server) will append its own Deployment + Service + NetworkPolicy.

images:
  - name: __ACR_LOGIN_SERVER__/taskmgr-webapp
    newName: __ACR_LOGIN_SERVER__/taskmgr-webapp
    newTag: __IMAGE_TAG__
