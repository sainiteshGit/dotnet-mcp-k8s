apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskmgr-sa
  namespace: taskmgr
  annotations:
    # Replaced at deploy time with the UAMI clientId output from infra/main.bicep
    # (uami.outputs.clientId). Replacement is performed by the deploy script /
    # Kustomize patch in story phases; the literal placeholder is intentional.
    azure.workload.identity/client-id: __UAMI_CLIENT_ID__
  labels:
    azure.workload.identity/use: "true"
automountServiceAccountToken: true
