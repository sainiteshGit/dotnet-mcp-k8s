# T063 — Web App Deployment.
#
# Constitution-mandated pod securityContext: non-root uid 10001,
# readOnlyRootFilesystem, allowPrivilegeEscalation=false, capabilities.drop=ALL,
# seccompProfile=RuntimeDefault. Only writable mount is an emptyDir at /tmp.
#
# Workload Identity: pod label `azure.workload.identity/use: "true"` projects
# the federated token bound to taskmgr-sa (see deploy/base/serviceaccount.yaml).
# Postgres auth uses that token — no static password.
#
# Image reference uses two replacement placeholders substituted at deploy time
# by the CI deploy job (T070):
#   __ACR_LOGIN_SERVER__   <- acr.outputs.loginServer (main.bicep)
#   __IMAGE_TAG__          <- short git SHA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: taskmgr
  labels:
    app.kubernetes.io/name: webapp
    app.kubernetes.io/part-of: taskmgr
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webapp
        app.kubernetes.io/part-of: taskmgr
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: taskmgr-sa
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webapp
          image: __ACR_LOGIN_SERVER__/taskmgr-webapp:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: webapp-config
                  key: POSTGRES_HOST
            - name: POSTGRES_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: webapp-config
                  key: POSTGRES_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: webapp-config
                  key: POSTGRES_USER
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
