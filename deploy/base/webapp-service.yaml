# T064 — Web App Service. ClusterIP only; ingress is wired in a later phase.
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: taskmgr
  labels:
    app.kubernetes.io/name: webapp
    app.kubernetes.io/part-of: taskmgr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: webapp
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
