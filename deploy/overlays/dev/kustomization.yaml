apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskmgr
namePrefix: dev-

resources:
  - ../../base

# Story phases will append patches for env-specific config (image tags,
# replicas, resource limits, NetworkPolicy overrides).
patches:
  # T100 — dev-only: enable MCP write tools (Principle II dev exception).
  - path: mcp-allow-mutations-patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: mcp-server
